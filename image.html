<!DOCTYPE html>
<html>
<head>
    <title>Image Insertion Example</title>
</head>
<body>
    <h1>My Favorite Picture</h1>
    <!-- Basic image insertion -->
    <img src="image.jpg" alt="A beautiful scenery" width="500" height="300">

    <!-- Image with link -->
    <p>Click the image to visit a website:</p>
    <a href="https://www.example.com">
        <img src="image.jpg" alt="Clickable image" width="300" height="200">
    </a>
</body>
</html>
